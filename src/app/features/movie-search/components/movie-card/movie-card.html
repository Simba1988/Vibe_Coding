<mat-card
  class="movie-card"
  (click)="onCardClick()"
  (keydown.enter)="onCardClick()"
  tabindex="0"
  role="button"
  [attr.aria-label]="'View details for ' + movie().title"
>
  <div class="poster-container">
    @if (movie().posterUrl) {
      <img [src]="movie().posterUrl" [alt]="movie().title + ' poster'" class="poster" />
    } @else {
      <div class="poster-placeholder">
        <mat-icon class="placeholder-icon">movie</mat-icon>
        <span>No Image</span>
      </div>
    }
  </div>
  <mat-card-content class="card-info">
    <h3 class="movie-title">{{ movie().title }}</h3>
    <p class="movie-year">{{ movie().year }}</p>
  </mat-card-content>
</mat-card>
